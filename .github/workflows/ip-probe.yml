name: IP Probe
on:
  workflow_dispatch:
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Test anti-bot da IP GitHub-hosted
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"
          echo "IP runner: $(curl -s https://api.ipify.org)"
          echo "rebuy:  $(curl -s -o /dev/null -w '%{http_code}' --max-time 25 -A "$UA" 'https://www.rebuy.it/comprare/console-e-accessori/xbox/xbox-series-x/console')"
          echo "subito: $(curl -s -o /dev/null -w '%{http_code}' --max-time 25 -A "$UA" 'https://www.subito.it/annunci-italia/vendita/usato/?q=xbox')"
          NEXT=$(curl -s --max-time 25 -A "$UA" 'https://www.subito.it/annunci-lombardia/vendita/usato/?q=xbox' | grep -c "__NEXT_DATA__" || true)
          echo "subito __NEXT_DATA__ presente: $NEXT"
