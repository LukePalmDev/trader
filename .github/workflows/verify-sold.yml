name: Verify Sold Subito

on:
  schedule:
    # 03:00 UTC = 05:00 CEST (estate) — dopo lo scrape notturno di Subito
    - cron: '0 3 * * *'
  workflow_dispatch:  # trigger manuale dalla UI GitHub

concurrency:
  group: scrape-db
  cancel-in-progress: false

jobs:
  verify-sold:
    runs-on: self-hosted
    timeout-minutes: 60   # hard ceiling: --max-runtime-minutes 45 è il soft limit Python
    env:
      TRADER_PLAYWRIGHT_CHANNEL: chrome
      TRADER_VIEWER_OPEN_BROWSER: "false"
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Pull latest DB
        run: git pull --rebase

      - name: Install Python dependencies
        run: python3.11 -m pip install -r requirements.lock

      - name: Verifica annunci venduti
        run: >
          python3.11 verify_sold.py
          --all
          --max-runtime-minutes 45
          --concurrency 18
          --chunk-size 350
          --browser-restart-every 3
          --nav-timeout-ms 7000
          --body-timeout-seconds 2.5
          --dom-fallback-timeout-ms 1200
          --max-http403-ratio 0.02
          --fail-fast-min-attempts 700
          --fail-fast-blocked-ratio 0.85
          --fail-fast-403-ratio 0.60
          --selection-sample 5

      - name: Commit e push DB aggiornato
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin
          git reset --mixed origin/main
          git add tracker.db
          git diff --staged --quiet \
            || git commit -m "chore: verify-sold $(date -u +%Y-%m-%d)"
          git push
