name: Verify Sold Subito

on:
  schedule:
    # Manteniamo verify-sold nelle finestre mattutine osservate come piu' stabili.
    # 1 ora dopo lo scraper Subito: 03:00 09:00 UTC → 05/11 CEST
    - cron: '0 3,9 * * *'
  workflow_dispatch:  # trigger manuale dalla UI GitHub

concurrency:
  group: scrape-db
  cancel-in-progress: false

jobs:
  verify-sold:
    runs-on: self-hosted
    timeout-minutes: 60   # hard ceiling: --max-runtime-minutes 55 è il soft limit Python
    env:
      TRADER_PLAYWRIGHT_CHANNEL: chrome
      TRADER_VIEWER_OPEN_BROWSER: "false"
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Pull latest DB
        run: git pull --rebase

      - name: Install Python dependencies
        run: python3.11 -m pip install -r requirements.lock

      - name: Install patchright browser (fallback chromium)
        run: |
          python3.11 -m patchright install chromium

      - name: Verifica annunci venduti
        id: verify
        run: |
          set +e
          python3.11 verify_sold.py \
            --all \
            --max-runtime-minutes 55 \
            --concurrency 12 \
            --cffi-concurrency 10 \
            --chunk-size 200 \
            --browser-restart-every 4 \
            --nav-timeout-ms 7000 \
            --max-http403-ratio 0.02 \
            --min-coverage-ratio 0.85 \
            --fail-fast-min-attempts 400 \
            --fail-fast-blocked-ratio 0.85 \
            --fail-fast-403-ratio 0.60
          VERIFY_EXIT=$?
          echo "exit_code=${VERIFY_EXIT}" >> "$GITHUB_OUTPUT"
          # Exit code 3 = coverage sotto soglia: non fallire il job (il retry step gestisce)
          # Tutti gli altri errori (1, 2, …) falliscono il job normalmente
          [ "${VERIFY_EXIT}" -eq 0 ] || [ "${VERIFY_EXIT}" -eq 3 ] || exit "${VERIFY_EXIT}"

      - name: Aggiorna coverage history CSV
        run: |
          CSV=logs/coverage_history.csv
          mkdir -p logs
          if [ ! -f "$CSV" ]; then
            echo "date,coverage_pct,verified,skipped,sold_new" > "$CSV"
          fi
          if [ -f logs/verify_sold_last_run.json ]; then
            python3.11 - <<'PY'
import json, pathlib, sys
p = pathlib.Path("logs/verify_sold_last_run.json")
d = json.loads(p.read_text())
row = f"{d['date']},{d['coverage_pct']},{d['verified']},{d['skipped']},{d['sold_new']}"
with open("logs/coverage_history.csv", "a") as f:
    f.write(row + "\n")
PY
          fi

      - name: Commit e push DB aggiornato
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git fetch origin
          git reset --mixed origin/main
          git add tracker.db logs/coverage_history.csv
          git diff --staged --quiet \
            || git commit -m "chore: verify-sold $(date -u +%Y-%m-%d)"
          git push

      - name: Retry automatico se coverage sotto soglia (exit code 3)
        if: steps.verify.outputs.exit_code == '3'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Coverage sotto soglia (exit 3): triggero nuovo run di verify-sold tra ~1 min"
          gh workflow run verify-sold.yml --ref main

      - name: Fallisci il job se coverage sotto soglia
        if: steps.verify.outputs.exit_code == '3'
        run: |
          echo "::error::Coverage sotto soglia minima (exit code 3). Run automatico ri-schedulato."
          exit 3
