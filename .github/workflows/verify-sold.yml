name: Verify Sold

on:
  schedule:
    # 2x/giorno: 09:00 UTC (11:00 CEST) + 12:00 UTC (14:00 CEST)
    # Fascia diurna ottimale da dati empirici (7 run Apr 2026):
    #   cffi-block 8-17% (10:00-18:00 CEST) vs 30-34% (22:00-07:00 CEST) → coverage 82-91% vs 65-73%
    # 09:00 UTC: evita collisione con scrape-subito 08:00 UTC (stessa concurrency group scrape-db)
    # 12:00 UTC: 2h di margine prima di scrape-subito 14:00 UTC (era 13:00 UTC → solo 5 min di margine)
    - cron: '0 9,12 * * *'
  workflow_dispatch:  # trigger manuale dalla UI GitHub

concurrency:
  group: scrape-db
  cancel-in-progress: false

jobs:
  verify-sold:
    runs-on: self-hosted
    timeout-minutes: 60   # hard ceiling: --max-runtime-minutes 55 è il soft limit Python
    env:
      TRADER_PLAYWRIGHT_CHANNEL: chrome
      TRADER_VIEWER_OPEN_BROWSER: "false"
    permissions:
      contents: write

    steps:
      - name: Ensure git (Homebrew fallback se Xcode CLT mancante)
        run: |
          # Se git non è disponibile (Xcode CLT invalidato dopo aggiornamento macOS),
          # installa via Homebrew: non richiede CLT, usa bottle pre-compilato.
          if ! git --version &>/dev/null 2>&1; then
            echo "git non disponibile — installazione via Homebrew..."
            /opt/homebrew/bin/brew install git
            echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          fi

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Ensure git, repo state and pull
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -d .git ]; then
            echo "Checkout via REST API: re-init del repository locale..."
            git init -b main
            git remote add origin "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
            git fetch origin
            git reset --mixed origin/main
          else
            git fetch origin
            git reset --mixed origin/main
          fi

      - name: Install Python dependencies
        run: python3.11 -m pip install -r requirements.lock

      - name: Install patchright browser (fallback chromium)
        run: |
          python3.11 -m patchright install chromium

      - name: Verifica annunci venduti
        id: verify
        run: |
          set +e
          python3.11 verify_sold.py \
            --all \
            --max-runtime-minutes 55 \
            --concurrency 8 \
            --cffi-concurrency 6 \
            --chunk-size 200 \
            --browser-restart-every 2 \
            --nav-timeout-ms 7000 \
            --max-http403-ratio 0.40 \
            --min-coverage-ratio 0.40 \
            --fail-fast-min-attempts 400 \
            --fail-fast-blocked-ratio 0.85 \
            --fail-fast-403-ratio 0.60
          VERIFY_EXIT=$?
          echo "exit_code=${VERIFY_EXIT}" >> "$GITHUB_OUTPUT"
          # Exit code 3 = coverage sotto soglia: non fallire il job qui (gestito da step finale)
          # Tutti gli altri errori (1, 2, …) falliscono il job normalmente
          [ "${VERIFY_EXIT}" -eq 0 ] || [ "${VERIFY_EXIT}" -eq 3 ] || exit "${VERIFY_EXIT}"

      - name: Aggiorna coverage history CSV
        run: |
          CSV=logs/coverage_history.csv
          mkdir -p logs
          [ -f "$CSV" ] || echo "date,coverage_pct,verified,skipped,sold_new" > "$CSV"
          if [ -f logs/verify_sold_last_run.json ]; then
            python3.11 -c "import json,pathlib; d=json.loads(pathlib.Path('logs/verify_sold_last_run.json').read_text()); open('logs/coverage_history.csv','a').write('{},{},{},{},{}\n'.format(d['date'],d['coverage_pct'],d['verified'],d['skipped'],d['sold_new']))"
          fi

      - name: Commit e push DB aggiornato
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tracker.db logs/coverage_history.csv
          git diff --staged --quiet \
            || git commit -m "chore: verify-sold $(date -u +%Y-%m-%d)"
          git push origin main

      - name: Fallisci il job se coverage sotto soglia
        if: steps.verify.outputs.exit_code == '3'
        run: |
          echo "::error::Coverage sotto soglia minima (exit code 3). Prossima verifica al run schedulato."
          exit 3
