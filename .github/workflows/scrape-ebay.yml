name: Scrape eBay (venduti)

on:
  schedule:
    # 22:00 UTC = 00:00 CEST (estate) | 23:00 CET (inverno)
    - cron: '0 22 * * *'
  workflow_dispatch:  # trigger manuale dalla UI GitHub

jobs:
  scrape-ebay:
    runs-on: ubuntu-latest
    env:
      TRADER_VIEWER_OPEN_BROWSER: "false"
      TRADER_TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TRADER_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.lock

      - name: Scrape eBay venduti
        run: python run.py --source ebay

      - name: Cleanup and archive old data
        run: python run.py --cleanup

      - name: Commit and push DB/artifacts
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tracker.db
          git add logs/run_report_latest.json || true
          git diff --staged --quiet \
            || git commit -m "chore: scrape ebay $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
