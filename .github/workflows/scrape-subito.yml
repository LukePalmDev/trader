name: Subito.it

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'   # 02:00 08:00 14:00 20:00 UTC → 04/10/16/22 CEST
  workflow_dispatch:  # trigger manuale dalla UI GitHub

concurrency:
  group: scrape-db
  cancel-in-progress: false

jobs:
  scrape-subito:
    runs-on: self-hosted
    env:
      TRADER_PLAYWRIGHT_CHANNEL: chrome
      TRADER_VIEWER_OPEN_BROWSER: "false"
      TRADER_TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TRADER_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    permissions:
      contents: write

    steps:
      - name: Ensure git (Homebrew fallback se Xcode CLT mancante)
        run: |
          # Se git non è disponibile (Xcode CLT invalidato dopo aggiornamento macOS),
          # installa via Homebrew: non richiede CLT, usa bottle pre-compilato.
          if ! git --version &>/dev/null 2>&1; then
            echo "git non disponibile — installazione via Homebrew..."
            /opt/homebrew/bin/brew install git
            echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          fi

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure git and repo state
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -d .git ]; then
            echo "Checkout via REST API: re-init del repository locale..."
            git init -b main
            git remote add origin "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
            git fetch origin
            git reset --mixed origin/main
          else
            git fetch origin
            git reset --mixed origin/main
          fi

      - name: Install Python dependencies
        run: python3.11 -m pip install -r requirements.lock

      - name: Scrape Subito.it
        id: scrape
        run: |
          # Salva hash DB pre-scrape per confronto
          sha_before=$(shasum -a 256 tracker.db | cut -d' ' -f1)
          python3.11 run.py --source subito 2>&1 | tee /tmp/scrape.log
          sha_after=$(shasum -a 256 tracker.db | cut -d' ' -f1)
          if [ "$sha_before" = "$sha_after" ]; then
            echo "⚠️  DB invariato dopo scrape — possibile fallimento silenzioso"
            echo "db_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "✅ DB aggiornato con nuovi dati"
            echo "db_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Cleanup and archive old data
        if: steps.scrape.outputs.db_changed == 'true'
        run: python3.11 run.py --cleanup

      - name: Commit and push DB/artifacts
        if: steps.scrape.outputs.db_changed == 'true'
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add tracker.db alert_log.json logs/run_report_latest.json || true
          git diff --staged --quiet \
            || git commit -m "chore: scrape subito $(date -u +%Y-%m-%dT%H:%M)"
          git push origin main

      - name: Upload scrape log (debug)
        if: steps.scrape.outputs.db_changed == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-${{ github.run_id }}
          path: /tmp/scrape.log
          retention-days: 3
