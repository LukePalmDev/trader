name: Daily Scrape

on:
  schedule:
    # 05:00 UTC = 06:00 CET (inverno) / 07:00 CEST (estate)
    - cron: '0 5 * * *'
  workflow_dispatch:  # trigger manuale dalla UI GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # serve per fare git push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run scrapers
        run: python run.py

      - name: Commit and push DB + snapshots metadata
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add trader.db
          git diff --staged --quiet \
            || git commit -m "chore: scrape $(date -u +%Y-%m-%d)"
          git push
