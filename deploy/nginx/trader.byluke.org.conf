server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name trader.byluke.org _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trader.byluke.org _;

    root /opt/trader/app/viewer;
    index index.html;

    access_log /var/log/nginx/trader.access.log;
    error_log /var/log/nginx/trader.error.log;

    ssl_certificate /etc/letsencrypt/live/trader.byluke.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trader.byluke.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location = /robots.txt {
        default_type text/plain;
        return 200 "User-agent: *\nDisallow: /\n";
    }

    location = /viewer {
        return 404;
    }

    location = /viewer/ {
        return 404;
    }

    location = /viewer/index.html {
        return 404;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # Pagina stato log (apribile in nuova tab dal pulsante 🩺).
    location = /log {
        try_files /log.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
